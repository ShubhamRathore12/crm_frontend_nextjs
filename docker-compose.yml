version: '3.8'

services:
  crm-frontend:
    image: crm-frontend:latest
    container_name: crm-frontend
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BASE_PATH=/crm
      - NEXT_PUBLIC_API_URL=/backend
    restart: unless-stopped
    networks:
      - primeosys-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/crm"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

networks:
  primeosys-network:
    external: true
