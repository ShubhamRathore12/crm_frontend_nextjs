services:
  crm-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm-frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BASE_PATH=/crm
      - BACKEND_URL=http://172.17.0.1:8080
    networks:
      - crm-network

networks:
  crm-network:
    driver: bridge
