version: '3.8'

services:
  crm-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: crm-frontend:latest
    container_name: crm-frontend
    restart: unless-stopped
    ports:
      - "3005:3004"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BASE_PATH=/crm
      - NEXT_PUBLIC_API_BASE=https://primeosys.com/crm-backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - crm-network
    # Resource limits to prevent memory issues
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  crm-network:
    driver: bridge